<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipForge - AI Video Clipping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --surface-elevated: #1c1c1f;
      --surface-hover: #232328;
      --primary: #7c3aed;
      --primary-hover: #8b5cf6;
      --primary-light: #a78bfa;
      --accent: #06b6d4;
      --accent-light: #22d3ee;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border: #27272a;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { max-width: 1600px; margin: 0 auto; padding: 20px; }
    
    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--surface); border-radius: var(--radius-lg); margin-bottom: 20px; border: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-status { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--surface-elevated); border-radius: var(--radius-md); font-size: 13px; color: var(--text-secondary); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
    .status-dot.offline { background: var(--danger); }

    /* Upload Section */
    .upload-section { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 1200px) { .upload-section { grid-template-columns: 1fr; } }
    
    .upload-area { background: var(--surface); border-radius: var(--radius-lg); padding: 40px; border: 2px dashed var(--border); text-align: center; transition: all 0.2s; cursor: pointer; }
    .upload-area:hover, .upload-area.dragging { border-color: var(--primary); background: rgba(124, 58, 237, 0.05); }
    .upload-icon { width: 64px; height: 64px; margin: 0 auto 20px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
    .upload-icon svg { width: 32px; height: 32px; color: white; }
    .upload-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .upload-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .upload-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--primary); color: white; border-radius: var(--radius-md); font-weight: 600; font-size: 14px; transition: all 0.2s; }
    .upload-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .upload-formats { font-size: 12px; color: var(--text-muted); margin-top: 16px; }
    .upload-progress { margin-top: 20px; }
    .progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.3s; }
    .progress-text { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

    .source-options { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--border); }
    .source-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text-secondary); }
    .source-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 16px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
    .source-btn:hover { border-color: var(--primary); }
    .source-btn.active { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
    .source-btn svg { width: 20px; height: 20px; color: var(--text-muted); }
    .source-btn.active svg { color: var(--primary); }
    .source-btn-text { flex: 1; text-align: left; }
    .source-btn-name { font-weight: 500; font-size: 14px; }
    .source-btn-desc { font-size: 12px; color: var(--text-muted); }

    /* Editor */
    .editor-section { display: none; }
    .editor-section.active { display: block; }
    
    .editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .editor-title { font-size: 20px; font-weight: 600; }
    .editor-actions { display: flex; gap: 10px; }
    .btn-secondary { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-primary); font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-primary { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--primary); border: none; border-radius: var(--radius-md); color: white; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-primary:hover { background: var(--primary-hover); }

    .editor-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    @media (max-width: 1100px) { .editor-grid { grid-template-columns: 1fr; } }

    .video-panel { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); }
    .video-container { position: relative; background: #000; border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 16/9; }
    .video-container video { width: 100%; height: 100%; }
    .video-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
    .video-controls { display: flex; align-items: center; gap: 12px; padding: 16px 0; }
    .play-btn { width: 44px; height: 44px; background: var(--primary); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .play-btn:hover { transform: scale(1.05); }
    .play-btn svg { width: 20px; height: 20px; color: white; margin-left: 2px; }
    .play-btn.playing svg { margin-left: 0; }
    .progress-wrap { flex: 1; }
    .progress-bar-cust { height: 6px; background: var(--surface-elevated); border-radius: 3px; cursor: pointer; position: relative; }
    .progress-fill-cust { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.1s; }
    .progress-handle { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; background: var(--accent-light); border-radius: 50%; box-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
    .time-display { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); min-width: 100px; text-align: right; }

    .timeline-panel { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); margin-top: 16px; }
    .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .timeline-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .timeline-actions { display: flex; gap: 8px; }
    .timeline-btn { padding: 6px 12px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 11px; color: var(--text-secondary); cursor: pointer; }
    .timeline-btn:hover { color: var(--text-primary); }
    .timeline-track { position: relative; height: 64px; background: var(--bg); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; }
    .timeline-waveform { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; opacity: 0.4; }
    .wave-bar { width: 3px; background: var(--text-muted); border-radius: 2px; }
    .timeline-playhead { position: absolute; top: 0; width: 2px; height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); z-index: 10; }
    .timeline-selection { position: absolute; top: 0; height: 100%; background: rgba(124, 58, 237, 0.2); border-left: 2px solid var(--primary); border-right: 2px solid var(--primary); }
    .timeline-markers { display: flex; justify-content: space-between; padding-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }

    .sidebar { display: flex; flex-direction: column; gap: 16px; }
    .clip-settings { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); }
    .settings-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .settings-title svg { color: var(--primary); }
    
    .aspect-ratios { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .aspect-btn { padding: 12px 8px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; transition: all 0.2s; }
    .aspect-btn:hover { border-color: var(--primary); }
    .aspect-btn.active { border-color: var(--primary); background: rgba(124, 58, 237, 0.15); }
    .aspect-icon { width: 32px; height: 24px; margin: 0 auto 4px; background: var(--text-muted); border-radius: 3px; }
    .aspect-btn.active .aspect-icon { background: var(--primary); }
    .aspect-label { font-size: 10px; color: var(--text-muted); }
    .aspect-btn.active .aspect-label { color: var(--primary); }
    
    .input-group { margin-bottom: 16px; }
    .input-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .text-input { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .text-input:focus { border-color: var(--primary); }
    .text-input::placeholder { color: var(--text-muted); }
    
    .clip-range { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .range-input { padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-primary); text-align: center; }
    .range-input:focus { border-color: var(--primary); }
    
    .duration-box { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; background: var(--bg); border-radius: var(--radius-md); margin-bottom: 16px; }
    .duration-label { font-size: 12px; color: var(--text-muted); }
    .duration-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 600; color: var(--accent); }

    .caption-toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg); border-radius: var(--radius-md); margin-bottom: 12px; }
    .caption-toggle-label { font-size: 13px; font-weight: 500; }
    .toggle-switch { width: 44px; height: 24px; background: var(--surface-elevated); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; }
    .toggle-switch.active { background: var(--primary); }
    .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch.active::after { transform: translateX(20px); }
    
    .caption-style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .caption-style-btn { padding: 10px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .caption-style-btn:hover { border-color: var(--primary); }
    .caption-style-btn.active { border-color: var(--primary); background: rgba(124, 58, 237, 0.15); }

    .generate-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border: none; border-radius: var(--radius-md); color: white; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .generate-btn svg { width: 20px; height: 20px; }

    .clips-panel { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); flex: 1; }
    .clips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .clips-title { font-size: 14px; font-weight: 600; }
    .clips-count { font-size: 12px; color: var(--text-muted); background: var(--surface-elevated); padding: 4px 10px; border-radius: 20px; }
    .clips-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; }
    .clips-list::-webkit-scrollbar { width: 6px; }
    .clips-list::-webkit-scrollbar-track { background: var(--bg); }
    .clips-list::-webkit-scrollbar-thumb { background: var(--surface-elevated); border-radius: 3px; }
    
    .clip-card { display: flex; gap: 12px; padding: 12px; background: var(--bg); border-radius: var(--radius-md); border: 1px solid var(--border); animation: fadeIn 0.3s ease; }
    .clip-card:hover { border-color: var(--primary); }
    .clip-thumb { width: 100px; height: 56px; background: var(--surface-elevated); border-radius: var(--radius-sm); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
    .clip-thumb svg { width: 24px; height: 24px; color: var(--text-muted); }
    .clip-duration-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
    .clip-info { flex: 1; min-width: 0; }
    .clip-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .clip-meta { font-size: 11px; color: var(--text-muted); }
    .clip-score { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: rgba(16, 185, 129, 0.15); border-radius: 4px; font-size: 10px; color: var(--success); font-weight: 500; margin-left: 8px; }
    .clip-actions { display: flex; gap: 6px; align-items: center; }
    .clip-action-btn { width: 32px; height: 32px; background: var(--surface-elevated); border: none; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
    .clip-action-btn:hover { color: var(--text-primary); }
    .clip-action-btn.export:hover { background: var(--success); color: white; }
    .clip-action-btn.delete:hover { background: var(--danger); color: white; }
    .clip-action-btn svg { width: 16px; height: 16px; }

    .empty-clips { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
    .empty-clips svg { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px; }
    .empty-clips-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-clips-text { font-size: 13px; color: var(--text-muted); }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-content { background: var(--surface); border-radius: var(--radius-lg); padding: 40px; text-align: center; max-width: 400px; width: 90%; border: 1px solid var(--border); }
    .modal-spinner { width: 64px; height: 64px; margin: 0 auto 20px; position: relative; }
    .modal-spinner::before { content: ''; position: absolute; inset: 0; border: 3px solid var(--surface-elevated); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .modal-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
    .modal-progress { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .modal-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; transition: width 0.3s; }
    .modal-percent { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-muted); margin-top: 12px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .file-input { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // API Base URL - configure for your deployment
    const API_URL = window.location.hostname === 'localhost' 
      ? 'http://localhost:3000/api' 
      : '/api';

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds < 0) return '00:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function formatTimeFull(seconds) {
      if (isNaN(seconds) || seconds < 0) return '00:00:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function parseTime(timeStr) {
      const parts = timeStr.split(':').map(p => parseInt(p) || 0);
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      return 0;
    }

    function extractYouTubeId(url) {
      const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
      return match ? match[1] : null;
    }

    function App() {
      const [step, setStep] = useState('upload');
      const [sourceType, setSourceType] = useState('local');
      const [youtubeUrl, setYoutubeUrl] = useState('');
      const [videoId, setVideoId] = useState(null);
      const [videoUrl, setVideoUrl] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [startTime, setStartTime] = useState(0);
      const [endTime, setEndTime] = useState(60);
      const [aspectRatio, setAspectRatio] = useState('9:16');
      const [captionsEnabled, setCaptionsEnabled] = useState(true);
      const [captionStyle, setCaptionStyle] = useState('animated');
      const [clips, setClips] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [genProgress, setGenProgress] = useState(0);
      const [exportingClip, setExportingClip] = useState(null);
      const [exportProgress, setExportProgress] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      const [isUploading, setIsUploading] = useState(false);
      const [apiStatus, setApiStatus] = useState('checking');

      const videoRef = useRef(null);
      const timelineRef = useRef(null);

      // Check API status on mount
      useEffect(() => {
        checkApiStatus();
      }, []);

      const checkApiStatus = async () => {
        try {
          const res = await fetch(`${API_URL}/health`);
          if (res.ok) {
            setApiStatus('online');
          } else {
            setApiStatus('offline');
          }
        } catch {
          setApiStatus('offline');
        }
      };

      const handleFileSelect = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        setIsUploading(true);
        setUploadProgress(0);

        const formData = new FormData();
        formData.append('video', file);

        try {
          const xhr = new XMLHttpRequest();
          
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const percent = Math.round((e.loaded / e.total) * 100);
              setUploadProgress(percent);
            }
          };

          await new Promise((resolve, reject) => {
            xhr.onload = () => {
              if (xhr.status >= 200 && xhr.status < 300) {
                resolve(JSON.parse(xhr.responseText));
              } else {
                reject(new Error('Upload failed'));
              }
            };
            xhr.onerror = () => reject(new Error('Upload failed'));
            xhr.open('POST', `${API_URL}/upload`);
            xhr.send(formData);
          });

          // For local playback, use blob URL
          const localUrl = URL.createObjectURL(file);
          setVideoUrl(localUrl);
          setVideoId(file.name); // Use filename as ID for local
          setStep('editor');
          setStartTime(0);
          setEndTime(Math.min(60, 300)); // Default 60s or video length
          
          // Get video duration
          const tempVideo = document.createElement('video');
          tempVideo.src = localUrl;
          tempVideo.onloadedmetadata = () => {
            setDuration(tempVideo.duration);
            setEndTime(Math.min(60, tempVideo.duration));
          };

        } catch (err) {
          console.error('Upload error:', err);
          alert('Upload failed. Please try again.');
        } finally {
          setIsUploading(false);
          setUploadProgress(0);
        }
      };

      const handleYoutubeSubmit = async () => {
        const id = extractYouTubeId(youtubeUrl);
        if (!id) {
          alert('Invalid YouTube URL');
          return;
        }
        
        // Note: YouTube embeds don't work for export, but work for preview
        setVideoId(id);
        setVideoUrl(`https://www.youtube.com/embed/${id}?enablejsapi=1`);
        setSourceType('youtube');
        setStep('editor');
        setStartTime(0);
        setEndTime(60);
        
        // Try to get video info from YouTube API (requires backend)
        try {
          const res = await fetch(`${API_URL}/video/${id}`);
          if (res.ok) {
            const info = await res.json();
            setDuration(info.duration || 0);
          }
        } catch {}
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        const file = e.dataTransfer.files?.[0];
        if (file && file.type.startsWith('video/')) {
          handleFileSelect({ target: { files: [file] } });
        }
      };

      const togglePlay = () => {
        if (videoRef.current) {
          if (isPlaying) videoRef.current.pause();
          else videoRef.current.play();
          setIsPlaying(!isPlaying);
        }
      };

      const handleVideoLoaded = () => {
        if (videoRef.current) {
          setDuration(videoRef.current.duration);
          if (endTime > videoRef.current.duration) {
            setEndTime(Math.min(60, videoRef.current.duration));
          }
        }
      };

      const handleTimeUpdate = () => {
        if (videoRef.current) setCurrentTime(videoRef.current.currentTime);
      };

      const seekTo = (time) => {
        if (videoRef.current) {
          videoRef.current.currentTime = time;
          setCurrentTime(time);
        }
      };

      const handleSeek = (e) => {
        if (!timelineRef.current || duration === 0) return;
        const rect = timelineRef.current.getBoundingClientRect();
        const percent = Math.max(0, Math.min((e.clientX - rect.left) / rect.width, 1));
        const time = percent * duration;
        seekTo(time);
      };

      const generateClips = async () => {
        if (!videoId) return;
        
        setIsGenerating(true);
        setGenProgress(0);

        try {
          // Call backend API
          const res = await fetch(`${API_URL}/generate-clips`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              videoId: videoId,
              startTime,
              endTime,
              clipCount: 3
            })
          });

          const data = await res.json();
          
          // Simulate progress animation
          for (let i = 0; i <= 100; i += 10) {
            setGenProgress(i);
            await new Promise(r => setTimeout(r, 150));
          }

          setClips(data.clips || []);
        } catch (err) {
          console.error('Generate error:', err);
          // Fallback to mock clips if API unavailable
          const mockClips = [
            { id: 1, name: 'Clip 1', startTime, endTime: startTime + 30, duration: 30, score: 95 },
            { id: 2, name: 'Clip 2', startTime: startTime + 25, endTime: startTime + 55, duration: 30, score: 88 },
            { id: 3, name: 'Clip 3', startTime: startTime + 10, endTime: startTime + 40, duration: 30, score: 82 },
          ];
          setClips(mockClips);
        } finally {
          setIsGenerating(false);
          setGenProgress(100);
        }
      };

      const exportClip = async (clip) => {
        if (sourceType === 'youtube') {
          alert('Export works with uploaded videos only. YouTube videos are protected.');
          return;
        }

        setExportingClip(clip);
        setExportProgress(0);

        try {
          // Call backend API
          const res = await fetch(`${API_URL}/export`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              videoId: videoId,
              clipId: clip.id,
              startTime: clip.startTime,
              endTime: clip.endTime,
              aspectRatio
            })
          });

          const data = await res.json();

          if (data.success) {
            // Download the file
            const baseUrl = API_URL.replace('/api', '');
            window.location.href = `${baseUrl}${data.downloadUrl}`;
          } else {
            alert('Export failed: ' + (data.error || 'Unknown error'));
          }
        } catch (err) {
          console.error('Export error:', err);
          alert('Export failed. Make sure the backend is running.');
        } finally {
          setExportingClip(null);
          setExportProgress(0);
        }
      };

      const deleteClip = (id) => setClips(clips.filter(c => c.id !== id));

      const progress = duration > 0 ? (currentTime / duration) * 100 : 0;
      const selStart = duration > 0 ? (startTime / duration) * 100 : 0;
      const selEnd = duration > 0 ? (endTime / duration) * 100 : 0;
      const selWidth = selEnd - selStart;

      if (step === 'upload') {
        return (
          <div className="app">
            <header className="header">
              <div className="logo">
                <div className="logo-icon">⚡</div>
                <span className="logo-text">ClipForge</span>
              </div>
              <div className="header-status">
                <div className={`status-dot ${apiStatus === 'online' ? '' : 'offline'}`}></div>
                {apiStatus === 'online' ? 'API Connected' : 'API Offline (Local Mode)'}
              </div>
            </header>

            <div className="upload-section">
              <div 
                className={`upload-area ${isDragging ? 'dragging' : ''}`}
                onDrop={handleDrop}
                onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                onDragLeave={() => setIsDragging(false)}
              >
                <div className="upload-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <div className="upload-title">Drop your video here</div>
                <div className="upload-subtitle">or click to browse files</div>
                <label className="upload-btn">
                  Select Video
                  <input type="file" className="file-input" accept="video/*" onChange={handleFileSelect} disabled={isUploading} />
                </label>
                {isUploading && (
                  <div className="upload-progress">
                    <div className="progress-bar"><div className="progress-fill" style={{ width: `${uploadProgress}%` }}></div></div>
                    <div className="progress-text">Uploading... {uploadProgress}%</div>
                  </div>
                )}
                <div className="upload-formats">Supports MP4, MOV, WebM, MKV (max 500MB)</div>
              </div>

              <div className="source-options">
                <div className="source-title">Import from</div>
                <button className={`source-btn ${sourceType === 'youtube' ? 'active' : ''}`} onClick={() => setSourceType('youtube')}>
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                  <div className="source-btn-text">
                    <div className="source-btn-name">YouTube</div>
                    <div className="source-btn-desc">Paste any YouTube link</div>
                  </div>
                </button>
                <button className="source-btn" onClick={() => alert('Google Drive coming soon!')}>
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 11l-8.5 9.5h17l-8.5-9.5zm8.5-8.5v-2h-17v2h17zm-17 3.5h17l-8.5 9.5-8.5-9.5z"/></svg>
                  <div className="source-btn-text">
                    <div className="source-btn-name">Google Drive</div>
                    <div className="source-btn-desc">Connect your Drive</div>
                  </div>
                </button>
                <button className="source-btn" onClick={() => alert('Vimeo coming soon!')}>
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.977 6.416c-.105 2.338-1.739 5.543-4.894 9.609-3.268 4.247-6.026 6.37-8.29 6.37-1.409 0-2.578-1.294-3.553-3.881L5.322 11.4C4.603 8.816 3.834 7.522 3.01 7.522c-.179 0-.806.378-1.881 1.132L0 7.197c1.185-1.044 2.351-2.084 3.501-3.128C5.08 2.701 6.266 1.984 7.055 1.91c1.867-.18 3.016 1.1 3.447 3.838.465 2.953.789 4.789.971 5.507.539 2.45 1.131 3.674 1.776 3.674.502 0 1.256-.796 2.265-2.385 1.004-1.589 1.54-2.797 1.612-3.628.144-1.371-.395-2.061-1.614-2.061-.574 0-1.167.121-1.777.391 1.185-3.868 3.434-5.757 6.762-5.637 2.473.06 3.628 1.664 3.493 4.797l-.013.01z"/></svg>
                  <div className="source-btn-text">
                    <div className="source-btn-name">Vimeo</div>
                    <div className="source-btn-desc">Import from Vimeo</div>
                  </div>
                </button>
                
                {sourceType === 'youtube' && (
                  <div style={{ marginTop: 16, display: 'flex', gap: 8 }}>
                    <input 
                      className="text-input" 
                      placeholder="Paste YouTube URL..." 
                      value={youtubeUrl}
                      onChange={(e) => setYoutubeUrl(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleYoutubeSubmit()}
                      style={{ flex: 1 }}
                    />
                    <button className="btn-primary" onClick={handleYoutubeSubmit}>Load</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="app">
          <header className="header">
            <div className="logo">
              <div className="logo-icon">⚡</div>
              <span className="logo-text">ClipForge</span>
            </div>
            <div className="header-actions">
              <button className="btn-secondary" onClick={() => { setStep('upload'); setVideoUrl(null); setClips([]); }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                New Video
              </button>
              <div className="header-status">
                <div className={`status-dot ${apiStatus === 'online' ? '' : 'offline'}`}></div>
                {apiStatus === 'online' ? 'Connected' : 'Offline'}
              </div>
            </div>
          </header>

          <section className="editor-section active">
            <div className="editor-header">
              <h2 className="editor-title">AI Video Editor</h2>
              <div className="editor-actions">
                <button className="btn-secondary">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  Preview
                </button>
                <button className="btn-primary" onClick={() => clips.forEach(c => exportClip(c))}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Export All
                </button>
              </div>
            </div>

            <div className="editor-grid">
              <div>
                <div className="video-panel">
                  <div className="video-container">
                    {videoUrl ? (
                      sourceType === 'youtube' ? (
                        <iframe 
                          src={videoUrl} 
                          width="100%" 
                          height="100%" 
                          frameBorder="0" 
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                          allowFullScreen
                        ></iframe>
                      ) : (
                        <video 
                          ref={videoRef} 
                          src={videoUrl} 
                          onLoadedMetadata={handleVideoLoaded} 
                          onTimeUpdate={handleTimeUpdate} 
                          onPlay={() => setIsPlaying(true)} 
                          onPause={() => setIsPlaying(false)} 
                          onClick={togglePlay}
                        />
                      )
                    ) : (
                      <div className="video-placeholder">No video loaded</div>
                    )}
                  </div>
                  <div className="video-controls">
                    <button className={`play-btn ${isPlaying ? 'playing' : ''}`} onClick={togglePlay}>
                      {isPlaying ? (
                        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                      ) : (
                        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                      )}
                    </button>
                    <div className="progress-wrap">
                      <div className="progress-bar-cust" onClick={handleSeek}>
                        <div className="progress-fill-cust" style={{ width: `${progress}%` }}></div>
                        <div className="progress-handle" style={{ left: `${progress}%` }}></div>
                      </div>
                    </div>
                    <div className="time-display">{formatTime(currentTime)} / {formatTime(duration)}</div>
                  </div>
                </div>

                <div className="timeline-panel">
                  <div className="timeline-header">
                    <span className="timeline-label">Timeline</span>
                    <div className="timeline-actions">
                      <button className="timeline-btn">Zoom In</button>
                      <button className="timeline-btn">Zoom Out</button>
                    </div>
                  </div>
                  <div className="timeline-track" ref={timelineRef} onClick={handleSeek}>
                    <div className="timeline-waveform">
                      {Array.from({ length: 80 }).map((_, i) => <div key={i} className="wave-bar" style={{ height: `${Math.random() * 40 + 10}px` }}></div>)}
                    </div>
                    {selWidth > 0 && <div className="timeline-selection" style={{ left: `${selStart}%`, width: `${selWidth}%` }}></div>}
                    <div className="timeline-playhead" style={{ left: `${progress}%` }}></div>
                  </div>
                  <div className="timeline-markers">
                    <span>0:00</span>
                    <span>{formatTime(duration / 4)}</span>
                    <span>{formatTime(duration / 2)}</span>
                    <span>{formatTime(duration * 3 / 4)}</span>
                    <span>{formatTime(duration)}</span>
                  </div>
                </div>
              </div>

              <div className="sidebar">
                <div className="clip-settings">
                  <div className="settings-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    Clip Settings
                  </div>

                  <div className="input-group">
                    <label className="input-label">Aspect Ratio</label>
                    <div className="aspect-ratios">
                      {['9:16', '1:1', '16:9'].map(r => (
                        <div key={r} className={`aspect-btn ${aspectRatio === r ? 'active' : ''}`} onClick={() => setAspectRatio(r)}>
                          <div className="aspect-icon" style={{ width: r === '9:16' ? '18px' : r === '1:1' ? '24px' : '32px' }}></div>
                          <div className="aspect-label">{r}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="input-group">
                    <label className="input-label">Clip Range</label>
                    <div className="clip-range">
                      <input className="range-input" value={formatTimeFull(startTime)} onChange={(e) => setStartTime(parseTime(e.target.value))} placeholder="Start" />
                      <input className="range-input" value={formatTimeFull(endTime)} onChange={(e) => setEndTime(parseTime(e.target.value))} placeholder="End" />
                    </div>
                  </div>

                  <div className="duration-box">
                    <span className="duration-label">Duration</span>
                    <span className="duration-value">{formatTime(Math.max(0, endTime - startTime))}</span>
                  </div>

                  <div className="input-group">
                    <label className="caption-toggle" onClick={() => setCaptionsEnabled(!captionsEnabled)}>
                      <span className="caption-toggle-label">AI Captions</span>
                      <div className={`toggle-switch ${captionsEnabled ? 'active' : ''}`}></div>
                    </label>
                  </div>

                  {captionsEnabled && (
                    <div className="caption-style-grid">
                      {['Animated', 'Static'].map(style => (
                        <button key={style} className={`caption-style-btn ${captionStyle === style.toLowerCase() ? 'active' : ''}`} onClick={() => setCaptionStyle(style.toLowerCase())}>
                          {style}
                        </button>
                      ))}
                    </div>
                  )}

                  <button className="generate-btn" onClick={generateClips} disabled={isGenerating || !videoId}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    {isGenerating ? 'Generating...' : 'Generate Clips with AI'}
                  </button>
                </div>

                <div className="clips-panel">
                  <div className="clips-header">
                    <span className="clips-title">Generated Clips</span>
                    <span className="clips-count">{clips.length} clips</span>
                  </div>
                  {clips.length === 0 ? (
                    <div className="empty-clips">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                      <div className="empty-clips-title">No clips yet</div>
                      <div className="empty-clips-text">Click "Generate Clips with AI" to find the best moments</div>
                    </div>
                  ) : (
                    <div className="clips-list">
                      {clips.map(clip => (
                        <div key={clip.id} className="clip-card">
                          <div className="clip-thumb">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            <span className="clip-duration-badge">{formatTime(clip.duration)}</span>
                          </div>
                          <div className="clip-info">
                            <div className="clip-name">{clip.name}</div>
                            <div className="clip-meta">{formatTimeFull(clip.startTime)} - {formatTimeFull(clip.endTime)}</div>
                          </div>
                          <div className="clip-actions">
                            <span className="clip-score">🔥 {clip.score}</span>
                            <button className="clip-action-btn export" onClick={() => exportClip(clip)} title="Export">
                              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            </button>
                            <button className="clip-action-btn delete" onClick={() => deleteClip(clip.id)} title="Delete">
                              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>

          {isGenerating && (
            <div className="modal-overlay">
              <div className="modal-content">
                <div className="modal-spinner"></div>
                <div className="modal-title">AI is analyzing your video</div>
                <div className="modal-text">Finding the best moments to clip...</div>
                <div className="modal-progress">
                  <div className="modal-progress-fill" style={{ width: `${Math.min(100, genProgress)}%` }}></div>
                </div>
                <div className="modal-percent">{Math.round(genProgress)}%</div>
              </div>
            </div>
          )}

          {exportingClip && (
            <div className="modal-overlay">
              <div className="modal-content">
                <div className="modal-spinner"></div>
                <div className="modal-title">Exporting "{exportingClip.name}"</div>
                <div className="modal-text">Processing video with FFmpeg...</div>
                <div className="modal-progress">
                  <div className="modal-progress-fill" style={{ width: `${exportProgress}%` }}></div>
                </div>
                <div className="modal-percent">{exportProgress}%</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
